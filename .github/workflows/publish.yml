name: Publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Version tag to publish. Defaults to the latest v* tag.
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve publish tag
        id: publish_tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ "$EVENT_NAME" = "push" ]; then
            tag="$REF_NAME"
          elif [ -n "$INPUT_TAG" ]; then
            tag="$INPUT_TAG"
          else
            tag=$(git tag --sort=-v:refname | grep '^v' | head -n 1 || true)
          fi

          if [ -z "$tag" ]; then
            echo "::error::No v* tag available to publish"
            exit 1
          fi

          if ! git rev-parse --verify --quiet "refs/tags/$tag" >/dev/null; then
            echo "::error::Tag $tag not found"
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Publishing $tag"

      - name: Check out publish tag
        env:
          TAG: ${{ steps.publish_tag.outputs.tag }}
        run: git checkout "$TAG"

      - name: Require version tag
        env:
          TAG: ${{ steps.publish_tag.outputs.tag }}
        run: |
          version=$(python3 -c "import json; print(json.load(open('package.json'))['version'])")

          if [ "v$version" != "$TAG" ]; then
            echo "::error::package.json version v$version does not match $TAG"
            exit 1
          fi

          echo "Publishing $TAG"

      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run format:check
      - run: bun run typecheck
      - run: bun test

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Publish package to npm
        run: npm publish --provenance --access public
