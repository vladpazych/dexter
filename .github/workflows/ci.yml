name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Typecheck core
        run: bun run --cwd packages/dexter typecheck

      - name: Typecheck bun runtime
        run: bun run --cwd packages/dexter-bun typecheck

      - name: Typecheck node runtime
        run: bun run --cwd packages/dexter-node typecheck

      - name: Test core
        run: bun test packages/dexter/

      - name: Test bun runtime
        run: bun test packages/dexter-bun/

      - name: Test node runtime
        run: bun test packages/dexter-node/
